<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Contact List</h2>
    <table border="1">
        <tr>
            <th>S.No</th>
            <th>Name</th>
            <th>Phone Number</th>
            <th>Address</th>
            <th>Make Call</th>
            <th>Send Message</th>
        </tr>
        {% for contact in contacts %}
        <tr>
            <td>{{ contact.id }}</td>
            <td>{{ contact.name }}</td>
            <td>{{ contact.phone_number }}</td>
            <td>{{ contact.address }}</td>
            <td>
                <a href="tel:{{ contact.phone_number }}" class="call-btn">📞 (Call)</a>
            </td>
            <td>
                <a href="sms:{{ contact.phone_number }}" class="message-btn">💬 (Message)</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
